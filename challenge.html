<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Masta Ghimau IR Challenge | Hussein Mohamed masta ghimau</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Inter', sans-serif;
            touch-action: none;
        }
        
        #ar-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        
        .hud-header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            padding: 20px;
            color: white;
            pointer-events: auto;
        }
        
        .challenge-title {
            font-size: 24px;
            font-weight: 800;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0,255,255,0.5);
        }
        
        .author-credit {
            font-size: 12px;
            color: #888;
            font-family: 'JetBrains Mono', monospace;
            margin-top: 5px;
        }
        
        /* Status Panel */
        #status-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,10,20,0.95);
            border: 2px solid #00ffff;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            max-width: 90%;
            width: 400px;
            pointer-events: auto;
            box-shadow: 0 0 30px rgba(0,255,255,0.2);
        }
        
        .status-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .status-title {
            color: #00ffff;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .status-message {
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            background: #00ffff;
            color: #000;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            transition: all 0.3s;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0,255,255,0.5);
        }
        
        .btn-secondary {
            background: transparent;
            color: #00ffff;
            border: 2px solid #00ffff;
        }
        
        /* Debug Console */
        #debug-console {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.9);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #0f0;
            max-height: 150px;
            overflow-y: auto;
            z-index: 100;
            pointer-events: auto;
            display: none;
        }
        
        .log-entry { margin: 2px 0; }
        .log-error { color: #f44; }
        .log-warn { color: #fa0; }
        .log-info { color: #0f0; }
        
        /* Question Panel */
        #question-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(10,10,20,0.95);
            border: 2px solid #00ffff;
            border-radius: 20px;
            padding: 20px;
            pointer-events: auto;
            display: none;
            backdrop-filter: blur(10px);
            max-height: 40vh;
            overflow-y: auto;
        }
        
        .question-text {
            color: #fff;
            font-size: 18px;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        
        .option-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            background: rgba(0,255,255,0.1);
            border: 1px solid #00ffff;
            color: #00ffff;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            font-size: 16px;
        }
        
        .option-btn:hover { background: rgba(0,255,255,0.2); }
        .option-btn.correct { background: #00ff88; color: #000; border-color: #00ff88; }
        .option-btn.wrong { background: #ff0040; color: #fff; border-color: #ff0040; }
        
        /* Tracking Badge */
        #tracking-badge {
            position: absolute;
            top: 100px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 20px;
            color: #0f0;
            font-size: 14px;
            border: 1px solid #0f0;
            display: none;
        }
        
        #tracking-badge.lost {
            color: #f44;
            border-color: #f44;
        }
    </style>
</head>
<body>

    <!-- AR Container -->
    <div id="ar-container"></div>

    <!-- UI Layer -->
    <div id="ui-layer">
        <div class="hud-header">
            <div class="challenge-title" id="scenario-title">IR Challenge</div>
            <div class="author-credit">Hussein Mohamed masta ghimau | YT: @mastaghimau</div>
        </div>

        <div id="tracking-badge">● Tracking Active</div>

        <!-- Status Panel (Dynamic Content) -->
        <div id="status-panel">
            <div class="status-icon" id="status-icon">⏳</div>
            <div class="status-title" id="status-title">Initializing...</div>
            <div class="status-message" id="status-message">Loading AR components...</div>
            <div id="action-buttons" style="margin-top: 20px;">
                <!-- Buttons injected by JS -->
            </div>
        </div>

        <!-- Question Panel -->
        <div id="question-panel">
            <div class="question-text" id="question-text"></div>
            <div id="options-container"></div>
        </div>

        <!-- Debug Console -->
        <div id="debug-console"></div>
    </div>

    <!-- Load from local vendor folder (uploaded to GitHub) -->
    <script src="vendor/three.min.js"></script>
    <script type="module">
        import { MindARThree } from './vendor/mindar-image-three.prod.js';
        window.MindARThree = MindARThree;
    </script>
    
    <!-- Debug: Check if libraries loaded -->
    <script>
        setTimeout(() => {
            console.log('Three.js loaded:', typeof THREE !== 'undefined');
            console.log('MindAR loaded:', typeof MindARThree !== 'undefined');
            console.log('MindAR object:', window.MindARThree);
        }, 1000);
    </script>

    <script>
        // Logging System
        const Logger = {
            logs: [],
            console: document.getElementById('debug-console'),
            
            log(msg, type = 'info') {
                const entry = { time: new Date().toLocaleTimeString(), msg, type };
                this.logs.push(entry);
                console.log(`[${type.toUpperCase()}] ${msg}`);
                
                // Add to UI if visible
                if (this.console.style.display !== 'none') {
                    const div = document.createElement('div');
                    div.className = `log-entry log-${type}`;
                    div.textContent = `[${entry.time}] ${msg}`;
                    this.console.appendChild(div);
                    this.console.scrollTop = this.console.scrollHeight;
                }
            },
            
            error(msg) { this.log(msg, 'error'); },
            warn(msg) { this.log(msg, 'warn'); },
            info(msg) { this.log(msg, 'info'); },
            
            show() {
                this.console.style.display = 'block';
            }
        };

        // State Management
        const AppState = {
            scenario: 'ransomware',
            currentQuestion: 0,
            score: 0,
            arInitialized: false,
            fallbackMode: false,
            mindarThree: null
        };

        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        AppState.scenario = urlParams.get('scenario') || 'ransomware';

        // Challenge Data
        const Challenges = {
            ransomware: {
                name: "Ransomware Response V3",
                questions: [
                    {
                        text: "Critical: Systems encrypted, ransom note displayed. First action?",
                        options: ["Pay immediately", "Isolate network", "Format drives", "Call helpdesk"],
                        correct: 1,
                        explanation: "Isolation prevents lateral movement (NIST IR Step 3)"
                    },
                    {
                        text: "Attackers threaten to leak stolen data. This is called?",
                        options: ["Single Extortion", "Double Extortion", "Ransomware 2.0", "Data Breach"],
                        correct: 1,
                        explanation: "Double extortion = Encryption + Data leak threat"
                    }
                ]
            },
            phishing: {
                name: "Phishing Investigation",
                questions: [
                    {
                        text: "You clicked a phishing link. Immediate priority?",
                        options: ["Change credentials", "Ignore it", "Tell colleagues", "Buy Bitcoin"],
                        correct: 0
                    }
                ]
            },
            apt: {
                name: "APT Attack",
                questions: [
                    {
                        text: "Unknown actor inside network for months. This is?",
                        options: ["APT", "Script Kiddie", "Insider Threat", "Malware"],
                        correct: 0
                    }
                ]
            },
            supply: {
                name: "Supply Chain Attack",
                questions: [
                    {
                        text: "Software update contains backdoor. First step?",
                        options: ["Isolate systems", "Contact vendor", "Update all", "Ignore"],
                        correct: 0
                    }
                ]
            },
            ddos: {
                name: "DDoS Attack",
                questions: [
                    {
                        text: "Website offline due to traffic flood. Response?",
                        options: ["Activate mitigation", "Shutdown servers", "Pay attackers", "Wait"],
                        correct: 0
                    }
                ]
            },
            infostealer: {
                name: "InfoStealer Malware",
                questions: [
                    {
                        text: "Malware stealing passwords. First action?",
                        options: ["Reset credentials", "Run scan", "Update AV", "Backup"],
                        correct: 0
                    }
                ]
            }
        };

        // UI Helper Functions
        function updateStatus(icon, title, message, buttons = []) {
            document.getElementById('status-icon').textContent = icon;
            document.getElementById('status-title').textContent = title;
            document.getElementById('status-message').textContent = message;
            
            const btnContainer = document.getElementById('action-buttons');
            btnContainer.innerHTML = '';
            
            buttons.forEach(btn => {
                const button = document.createElement('button');
                button.className = 'btn ' + (btn.class || '');
                button.textContent = btn.text;
                button.onclick = btn.action;
                btnContainer.appendChild(button);
            });
        }

        function hideStatus() {
            document.getElementById('status-panel').style.display = 'none';
            document.getElementById('tracking-badge').style.display = 'block';
        }

        function showStatus() {
            document.getElementById('status-panel').style.display = 'block';
            document.getElementById('tracking-badge').style.display = 'none';
        }

        // System Checks
        async function checkSystem() {
            Logger.info('Starting system checks...');
            
            // 1. Check HTTPS
            if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost' && !window.location.hostname.includes('ngrok')) {
                Logger.warn('Not HTTPS - Camera will be blocked!');
                updateStatus(
                    '⚠️',
                    'HTTPS Required',
                    'Camera access requires secure connection. Use ngrok or GitHub Pages for HTTPS link.',
                    [
                        { text: 'Try Anyway', action: () => initAR() },
                        { text: 'Use Fallback Mode', class: 'btn-secondary', action: () => startFallbackMode() }
                    ]
                );
                return false;
            }
            
            // 2. Check Camera API
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                Logger.error('Camera API not supported');
                updateStatus(
                    '❌',
                    'Camera Not Supported',
                    'Your browser does not support camera access. Try Chrome or Safari.',
                    [{ text: 'Start Quiz Mode', action: () => startFallbackMode() }]
                );
                return false;
            }
            
            // 3. Check Libraries
            if (typeof THREE === 'undefined') {
                Logger.error('Three.js not loaded');
                updateStatus('❌', 'Library Error', 'Failed to load Three.js. Check internet connection.');
                return false;
            }
            
            if (typeof MindARThree === 'undefined') {
                Logger.error('MindAR not loaded');
                updateStatus('❌', 'Library Error', 'Failed to load MindAR. Check vendor/ folder.');
                return false;
            }
            
            Logger.info('System checks passed');
            return true;
        }

        // AR Initialization
        async function initAR() {
            Logger.info('Initializing AR...');
            updateStatus('⏳', 'Starting Camera...', 'Please allow camera access when prompted.');
            
            try {
                // Check if target file exists
                let targetExists = false;
                try {
                    const response = await fetch('./assets/targets/targets.mind');
                    targetExists = response.ok;
                    Logger.info(`Target file exists: ${targetExists}`);
                } catch (e) {
                    Logger.warn('Target file check failed: ' + e.message);
                }
                
                if (!targetExists) {
                    throw new Error('Image target file not found. AR requires compiled targets.mind file.');
                }
                
                const container = document.getElementById('ar-container');
                
                AppState.mindarThree = new MindARThree({
                    container: container,
                    imageTargetSrc: './assets/targets/targets.mind',
                    maxTrack: 1,
                    uiLoading: 'no',
                    uiScanning: 'no',
                    uiError: 'no'
                });
                
                const {renderer, scene, camera} = AppState.mindarThree;
                
                // Add lights
                const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
                scene.add(light);
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(0, 10, 0);
                scene.add(dirLight);
                
                // Create content
                const anchor = AppState.mindarThree.addAnchor(0);
                const arContent = createARContent(AppState.scenario);
                anchor.group.add(arContent);
                
                // Events
                anchor.onTargetFound = () => {
                    Logger.info('Target found!');
                    document.getElementById('tracking-badge').textContent = '● Target Locked';
                    document.getElementById('tracking-badge').style.color = '#0f0';
                    hideStatus();
                    showQuestion();
                };
                
                anchor.onTargetLost = () => {
                    Logger.warn('Target lost');
                    document.getElementById('tracking-badge').textContent = '○ Scanning...';
                    document.getElementById('tracking-badge').style.color = '#fa0';
                };
                
                // Start
                Logger.info('Starting MindAR...');
                await AppState.mindarThree.start();
                
                renderer.setAnimationLoop(() => {
                    renderer.render(scene, camera);
                });
                
                AppState.arInitialized = true;
                AppState.fallbackMode = false;
                
                updateStatus('📷', 'Point at Target', 'Aim camera at the image displayed on screen or printed card.');
                hideStatus();
                
            } catch (error) {
                Logger.error('AR Init failed: ' + error.message);
                updateStatus(
                    '⚠️',
                    'AR Initialization Failed',
                    error.message + '\n\nYou can still play in Quiz Mode without AR.',
                    [
                        { text: 'Start Quiz Mode', action: () => startFallbackMode() },
                        { text: 'Try Again', class: 'btn-secondary', action: () => initAR() }
                    ]
                );
            }
        }

        // Create 3D Content
        function createARContent(type) {
            const group = new THREE.Group();
            
            // Author Watermark (Always visible)
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0,0,512,128);
            ctx.font = 'Bold 28px Arial';
            ctx.fillStyle = '#00ffff';
            ctx.textAlign = 'center';
            ctx.fillText('Hussein Mohamed', 256, 45);
            ctx.fillText('masta ghimau', 256, 85);
            
            const tex = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
            sprite.scale.set(1.5, 0.4, 1);
            sprite.position.set(0, 1.2, 0);
            group.add(sprite);
            
            // Scenario objects
            switch(type) {
                case 'ransomware':
                    const lock = new THREE.Mesh(
                        new THREE.BoxGeometry(0.4, 0.5, 0.2),
                        new THREE.MeshPhongMaterial({ color: 0xff0040, emissive: 0x440000 })
                    );
                    lock.position.y = 0.25;
                    group.add(lock);
                    
                    // Glowing ring
                    const ring = new THREE.Mesh(
                        new THREE.RingGeometry(0.5, 0.6, 32),
                        new THREE.MeshBasicMaterial({ color: 0xff0040, side: THREE.DoubleSide })
                    );
                    ring.rotation.x = Math.PI/2;
                    ring.position.y = 0.5;
                    group.add(ring);
                    break;
                    
                case 'phishing':
                    const mail = new THREE.Mesh(
                        new THREE.BoxGeometry(0.5, 0.35, 0.1),
                        new THREE.MeshPhongMaterial({ color: 0x00aaff })
                    );
                    mail.position.y = 0.2;
                    group.add(mail);
                    break;
                    
                case 'apt':
                    const spy = new THREE.Mesh(
                        new THREE.SphereGeometry(0.25, 32, 32),
                        new THREE.MeshPhongMaterial({ color: 0xffaa00 })
                    );
                    spy.position.y = 0.25;
                    group.add(spy);
                    break;
                    
                default:
                    const box = new THREE.Mesh(
                        new THREE.BoxGeometry(0.4, 0.4, 0.4),
                        new THREE.MeshPhongMaterial({ color: 0x00ffff })
                    );
                    box.position.y = 0.2;
                    group.add(box);
            }
            
            return group;
        }

        // Fallback Mode (No AR)
        function startFallbackMode() {
            Logger.info('Starting Fallback Mode (No AR)');
            AppState.fallbackMode = true;
            AppState.arInitialized = false;
            
            // Clear AR container
            document.getElementById('ar-container').innerHTML = '';
            document.getElementById('ar-container').style.background = 'linear-gradient(135deg, #1e3c72 0%, #2a5298 100%)';
            
            updateStatus(
                '❗',
                'AR Mode Unavailable',
                'Camera access denied or libraries missing. Switching to Quiz Mode. You can still answer all questions!',
                [{ text: 'Start Challenge', action: () => { hideStatus(); showQuestion(); } }]
            );
        }

        // Quiz Functions
        function showQuestion() {
            const challenge = Challenges[AppState.scenario] || Challenges.ransomware;
            const q = challenge.questions[AppState.currentQuestion];
            
            if (!q) {
                showCompletion();
                return;
            }
            
            document.getElementById('question-text').textContent = q.text;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => handleAnswer(idx, q.correct, btn, q.explanation);
                container.appendChild(btn);
            });
            
            document.getElementById('question-panel').style.display = 'block';
        }

        function handleAnswer(selected, correct, btn, explanation) {
            const allBtns = document.querySelectorAll('.option-btn');
            
            if (selected === correct) {
                btn.classList.add('correct');
                AppState.score += 100;
                Logger.info('Correct answer!');
            } else {
                btn.classList.add('wrong');
                allBtns[correct].classList.add('correct');
                Logger.warn('Wrong answer');
            }
            
            if (explanation) {
                setTimeout(() => alert(explanation), 100);
            }
            
            setTimeout(() => {
                AppState.currentQuestion++;
                showQuestion();
            }, selected === correct ? 1000 : 2000);
        }

        function showCompletion() {
            document.getElementById('question-panel').innerHTML = `
                <div style="text-align: center; padding: 20px;">
                    <div style="font-size: 48px; margin-bottom: 10px;">🏆</div>
                    <h2 style="color: #00ffff; margin-bottom: 10px;">Challenge Complete!</h2>
                    <p style="color: #fff; font-size: 18px; margin-bottom: 20px;">
                        Score: ${AppState.score} points
                    </p>
                    <p style="color: #888; font-size: 14px;">
                        Developed by Hussein Mohamed masta ghimau<br>
                        YT: @mastaghimau | GH: gh1mau
                    </p>
                    <button class="btn" onclick="location.reload()" style="margin-top: 20px;">
                        Play Again
                    </button>
                </div>
            `;
        }

        // Init
        window.onload = () => {
            Logger.info('Page loaded. Scenario: ' + AppState.scenario);
            document.getElementById('scenario-title').textContent = 
                (Challenges[AppState.scenario]?.name || 'IR Challenge');
            
            // Show debug double-tap
            document.addEventListener('dblclick', () => {
                Logger.show();
                Logger.info('Debug console opened');
            });
            
            // Start checks
            checkSystem().then(passed => {
                if (passed) {
                    updateStatus(
                        '📱',
                        'Ready to Start',
                        'Camera and libraries ready. Click below to initialize AR.',
                        [{ text: 'Start Camera', action: initAR }]
                    );
                }
            });
        };

        // Handle errors gracefully
        window.onerror = (msg, url, line) => {
            Logger.error(`Error: ${msg} at line ${line}`);
            // Show error on screen for mobile debugging
            updateStatus('❌', 'JavaScript Error', `${msg}\nLine: ${line}`, [
                { text: 'Show Debug Info', action: () => { Logger.show(); } },
                { text: 'Continue', class: 'btn-secondary', action: () => startFallbackMode() }
            ]);
            return false;
        };
        
        // Catch script loading errors
        window.addEventListener('error', (e) => {
            if (e.target && e.target.tagName === 'SCRIPT') {
                Logger.error(`Failed to load: ${e.target.src}`);
                updateStatus('❌', 'Library Load Error', `Failed to load:\n${e.target.src}\n\nCheck vendor/ folder exists in GitHub repo.`, [
                    { text: 'Use Quiz Mode', action: () => startFallbackMode() }
                ]);
            }
        }, true);
    </script>
</body>
</html>
