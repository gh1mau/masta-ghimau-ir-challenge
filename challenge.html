<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Masta Ghimau IR Challenge | Hussein Mohamed masta ghimau</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Inter', sans-serif;
            touch-action: none;
        }

        #ar-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .hud-header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            padding: 20px;
            color: white;
            pointer-events: auto;
        }

        .challenge-title {
            font-size: 24px;
            font-weight: 800;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0,255,255,0.5);
        }

        .author-credit {
            font-size: 12px;
            color: #888;
            font-family: 'JetBrains Mono', monospace;
            margin-top: 5px;
        }

        /* Status Panel */
        #status-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,10,20,0.95);
            border: 2px solid #00ffff;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            max-width: 90%;
            width: 400px;
            pointer-events: auto;
            box-shadow: 0 0 30px rgba(0,255,255,0.2);
        }

        .status-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .status-title {
            color: #00ffff;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .status-message {
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 24px;
            background: #00ffff;
            color: #000;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0,255,255,0.5);
        }

        .btn-secondary {
            background: transparent;
            color: #00ffff;
            border: 2px solid #00ffff;
        }

        /* Question Panel - Full screen, no scroll */
        #question-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10,10,20,0.98);
            border: none;
            border-radius: 0;
            padding: 15px;
            pointer-events: auto;
            display: none; /* Hidden by default, shown via JS */
            backdrop-filter: blur(10px);
            overflow: hidden;
            flex-direction: column;
        }

        #question-panel.active {
            display: flex;
        }

        .question-text {
            color: #fff;
            font-size: 16px;
            margin-bottom: 12px;
            line-height: 1.4;
            flex-shrink: 0;
        }

        #options-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            overflow: hidden;
        }

        .option-btn {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 12px 14px;
            background: rgba(0,255,255,0.1);
            border: 1px solid #00ffff;
            color: #00ffff;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            flex: 1;
            min-height: 0;
        }

        .option-btn:hover { background: rgba(0,255,255,0.2); }
        .option-btn.correct { background: #00ff88; color: #000; border-color: #00ff88; }
        .option-btn.wrong { background: #ff0040; color: #fff; border-color: #ff0040; }

        /* Tracking Badge */
        #tracking-badge {
            position: absolute;
            top: 100px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 20px;
            color: #0f0;
            font-size: 14px;
            border: 1px solid #0f0;
            display: none;
        }

        #tracking-badge.lost {
            color: #f44;
            border-color: #f44;
        }

        /* Nickname Entry Modal */
        #nickname-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        .nickname-container {
            background: linear-gradient(135deg, #0a0a1f 0%, #1a1a3f 100%);
            border: 2px solid #00ffff;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 90%;
            width: 400px;
            box-shadow: 0 0 50px rgba(0,255,255,0.3);
        }

        .nickname-title {
            color: #00ffff;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0,255,255,0.5);
        }

        .nickname-subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .nickname-input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0,255,255,0.1);
            border: 2px solid #00ffff;
            border-radius: 10px;
            color: #fff;
            font-size: 18px;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s;
        }

        .nickname-input:focus {
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
            background: rgba(0,255,255,0.15);
        }

        .nickname-input::placeholder {
            color: #666;
        }

        /* Leaderboard Panel */
        #leaderboard-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            width: 280px;
            background: rgba(10,10,20,0.95);
            border: 2px solid #00ffff;
            border-radius: 15px;
            padding: 15px;
            z-index: 100;
            display: none;
            backdrop-filter: blur(10px);
            max-height: 60vh;
            overflow-y: auto;
        }

        .leaderboard-title {
            color: #00ffff;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0,255,255,0.3);
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            margin: 5px 0;
            background: rgba(0,255,255,0.05);
            border-radius: 8px;
            font-size: 14px;
        }

        .leaderboard-rank {
            width: 30px;
            color: #00ffff;
            font-weight: 700;
        }

        .leaderboard-name {
            flex: 1;
            color: #fff;
            margin-left: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .leaderboard-score {
            color: #00ff41;
            font-weight: 700;
        }

        .leaderboard-item.current-player {
            background: rgba(0,255,255,0.2);
            border: 1px solid #00ffff;
        }

        .leaderboard-item.top-3 {
            background: linear-gradient(90deg, rgba(255,215,0,0.2) 0%, rgba(0,255,255,0.1) 100%);
        }
    </style>
</head>
<body>

    <!-- AR Container -->
    <div id="ar-container"></div>

    <!-- Nickname Entry Modal -->
    <div id="nickname-modal">
        <div class="nickname-container">
            <div class="nickname-title">👻 ENTER NICKNAME</div>
            <div class="nickname-subtitle">Join the challenge and compete with others!</div>
            <input type="text" id="nickname-input" class="nickname-input" placeholder="Your nickname" maxlength="20">
            <button id="nickname-submit" class="btn" style="width: 100%;">JOIN CHALLENGE</button>
        </div>
    </div>

    <!-- UI Layer -->
    <div id="ui-layer">
        <div class="hud-header">
            <div class="challenge-title" id="scenario-title">IR Challenge</div>
            <div class="author-credit">Hussein Mohamed masta ghimau | YT: @mastaghimau</div>
        </div>

        <div id="tracking-badge">● Tracking Active</div>

        <!-- Leaderboard Panel -->
        <div id="leaderboard-panel">
            <div class="leaderboard-title">🏆 LIVE LEADERBOARD</div>
            <div id="leaderboard-list">
                <!-- Leaderboard items injected by JS -->
            </div>
        </div>

        <!-- Status Panel (Dynamic Content) -->
        <div id="status-panel">
            <div class="status-icon" id="status-icon">⏳</div>
            <div class="status-title" id="status-title">Initializing...</div>
            <div class="status-message" id="status-message">Loading AR components...</div>
            <div id="action-buttons" style="margin-top: 20px;">
                <!-- Buttons injected by JS -->
            </div>
        </div>

        <!-- Question Panel -->
        <div id="question-panel">
            <div class="question-text" id="question-text"></div>
            <div id="options-container"></div>
        </div>
    </div>

    <!-- Import Map for ES Modules -->
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
        "mind-ar": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
      }
    }
    </script>

    <!-- Direct Nickname Handler (Non-Module) -->
    <script>
        // Direct handler for nickname submission
        window.handleNicknameSubmit = function() {
            console.log('Direct handler called');
            const input = document.getElementById('nickname-input');
            const modal = document.getElementById('nickname-modal');
            const nickname = input.value.trim();

            if (nickname.length >= 2 && nickname.length <= 20) {
                console.log('Valid nickname:', nickname);
                modal.style.display = 'none';

                // Store in localStorage for app.js to pick up
                localStorage.setItem('mastaGhimau_playerName', nickname);
                localStorage.setItem('mastaGhimau_playerId', 'player_' + Date.now());

                // Dispatch custom event for app.js
                window.dispatchEvent(new CustomEvent('nicknameSubmitted', {
                    detail: { nickname: nickname }
                }));
            } else {
                console.log('Invalid nickname');
                input.style.borderColor = '#ff0040';
                setTimeout(() => {
                    input.style.borderColor = '#00ffff';
                }, 500);
            }
        };

        // Attach handler when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Attaching nickname handlers');
            const submitBtn = document.getElementById('nickname-submit');
            const input = document.getElementById('nickname-input');

            if (submitBtn) {
                submitBtn.onclick = window.handleNicknameSubmit;
                console.log('Submit button handler attached');
            }

            if (input) {
                input.onkeypress = function(e) {
                    if (e.key === 'Enter') window.handleNicknameSubmit();
                };
            }
        });
    </script>

    <!-- Main Application (ES Modules) -->
    <script type="module" src="js/app.js"></script>

</body>
</html>
